<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Brison's Detailing</title>
  <style>
    body { margin: 0; font-family: Arial, sans-serif; background: #000; color: #fff; }
    header { background: #000; padding: 20px; text-align: center; border-bottom: 1px solid #333; }
    header h1 { margin: 0; font-size: 2.5rem; color: gold; }
    .hero { padding: 80px 20px; text-align: center; }
    .hero h2 { color: gold; }
    .buttons { text-align: center; margin: 20px; }
    button { background: gold; color: black; border: none; padding: 12px 20px; margin: 10px; border-radius: 8px; cursor: pointer; font-weight: bold; }
    .details { max-width: 800px; margin: 20px auto; background: #111; padding: 20px; border-radius: 12px; border: 1px solid #333; }
    footer { text-align: center; padding: 20px; border-top: 1px solid #333; }
  </style>
</head>
<body>

<header>
  <h1>Brison's Precision Detailing</h1>
</header>

<section class="hero">
  <h2>Where Detailing Matters</h2>
  <p>Click a service below to see details</p>
</section>

<div class="buttons">
  <button onclick="showDetails('inside')">Inside ($30)</button>
  <button onclick="showDetails('outside')">Outside ($30)</button>
  <button onclick="showDetails('full')">Full ($50)</button>
</div>

<div id="details" class="details">
  <p>Select a service to see details.</p>
</div>

<section class="details">
  <h3>Contact</h3>
  <p>378 Van Orin Road, Sublette, Illinois 61367</p>
  <p>Phone: <a href="tel:8156151025" style="color:gold;">815-615-1025</a></p>
  <p>Email: <a href="mailto:brison.fenwick.12@gmail.com" style="color:gold;">brison.fenwick.12@gmail.com</a></p>
</section>

<footer>
  <p>© 2026 Brison's Detailing</p>
</footer>

<script>
function showDetails(type) {
  const box = document.getElementById('details');

  if (type === 'inside') {
    box.innerHTML = `
      <h3>Inside Detail - $30</h3>
      <p>Vacuuming, window cleaning, cleaned dashboard and surfaces, carpet and floor mats, wipe down of everything.</p>
    `;
  }

  if (type === 'outside') {
    box.innerHTML = `
      <h3>Outside Detail - $30</h3>
      <p>Full hand-done wash, hand dried with shammy, scrubbed rims and tires, tire shined, waxed, cleaned windows and mirrors, trim and plastics restored, polished.</p>
    `;
  }

  if (type === 'full') {
    box.innerHTML = `
      <h3>Full Detail - $50</h3>
      <p>Includes everything from inside and outside detailing for a complete clean.</p>
    `;
  }
}
</script>

</body>
</html>
